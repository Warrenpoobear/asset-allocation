name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts

      - name: Test
        run: |
          pytest -q --cov=aa_model.integration --cov=aa_model.pe.ta_model --cov-fail-under=80

      - name: End-to-end determinism check
        run: |
          rm -rf data/processed/runs/aa-*
          python scripts/run_sfo_study.py --config configs/base.yaml
          R1=$(ls -td data/processed/runs/aa-* | head -1)
          python scripts/run_sfo_study.py --config configs/base.yaml
          R2=$(ls -td data/processed/runs/aa-* | head -1)
          test "$R1" != "$R2" || { echo "expected distinct run dirs, got $R1"; exit 1; }
          python - <<PY
          import pandas as pd
          d1 = pd.read_parquet("$R1/ledger.parquet").drop(columns="run_id")
          d2 = pd.read_parquet("$R2/ledger.parquet").drop(columns="run_id")
          pd.testing.assert_frame_equal(d1, d2)
          print("determinism OK: ledger content byte-identical across distinct run dirs")
          PY

  adapters:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install with all adapter extras
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e ".[riskfolio,cvxportfolio]"

      - name: Riskfolio parity test (Phase 3a)
        run: |
          pytest -q tests/test_riskfolio_adapter.py

      - name: Cvxportfolio parity + numerical anchor test (Phase 3b)
        run: |
          pytest -q tests/test_cvxportfolio_adapter.py

      - name: End-to-end run with allocation engine=riskfolio
        run: |
          cp configs/base.yaml configs/_ci_riskfolio.yaml
          sed -i 's|  engine: stub|  engine: riskfolio|' configs/_ci_riskfolio.yaml
          python scripts/run_sfo_study.py --config configs/_ci_riskfolio.yaml
          rm configs/_ci_riskfolio.yaml

      - name: End-to-end run with implementation engine=cvxportfolio + 5 bps
        run: |
          python - <<'PY'
          import yaml
          with open("configs/base.yaml") as f:
              cfg = yaml.safe_load(f)
          cfg["implementation"] = {"engine": "cvxportfolio", "bps_per_trade": 5.0}
          with open("configs/_ci_cvxportfolio.yaml", "w") as f:
              yaml.safe_dump(cfg, f)
          PY
          python scripts/run_sfo_study.py --config configs/_ci_cvxportfolio.yaml
          rm configs/_ci_cvxportfolio.yaml
