name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts

      - name: Test
        run: |
          pytest -q --cov=aa_model.integration --cov=aa_model.pe.ta_model --cov-fail-under=80

      - name: End-to-end determinism check
        run: |
          rm -rf data/processed/runs/aa-*
          python scripts/run_sfo_study.py --config configs/base.yaml
          R1=$(ls -td data/processed/runs/aa-* | head -1)
          python scripts/run_sfo_study.py --config configs/base.yaml
          R2=$(ls -td data/processed/runs/aa-* | head -1)
          test "$R1" != "$R2" || { echo "expected distinct run dirs, got $R1"; exit 1; }
          python - <<PY
          import pandas as pd
          d1 = pd.read_parquet("$R1/ledger.parquet").drop(columns="run_id")
          d2 = pd.read_parquet("$R2/ledger.parquet").drop(columns="run_id")
          pd.testing.assert_frame_equal(d1, d2)
          print("determinism OK: ledger content byte-identical across distinct run dirs")
          PY
